<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="calculadora">
        <div class="calculadora-header">
            <span class="titulo">Calculadora</span>
            <span class="indicador">●</span>
        </div>
        <div class="output">
            <div class="expresion" id="expresion"></div>
            <input class="display" type="text" id="result" placeholder="0" readonly>
        </div>
        <div class="calculadora-grilla">
            <button class="btn btn-num" name="data-number">7</button>
            <button class="btn btn-num" name="data-number">8</button>
            <button class="btn btn-num" name="data-number">9</button>
            <button class="btn btn-opera" name="data-opera">/</button>
            <button class="btn btn-num" name="data-number">4</button>
            <button class="btn btn-num" name="data-number">5</button>
            <button class="btn btn-num" name="data-number">6</button>
            <button class="btn btn-opera" name="data-opera">x</button>
            <button class="btn btn-num" name="data-number">1</button>
            <button class="btn btn-num" name="data-number">2</button>
            <button class="btn btn-num" name="data-number">3</button>
            <button class="btn btn-opera" name="data-opera">-</button>
            <button class="btn btn-delete" name="data-delete">C</button>
            <button class="btn btn-num" name="data-number">0</button>
            <button class="btn btn-igual" name="data-igual">=</button>
            <button class="btn btn-opera" name="data-opera">+</button>
        </div>
    </div>

    <script src="js/calc.js"></script>
</body>
</html>
